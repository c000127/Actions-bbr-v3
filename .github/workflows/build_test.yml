name: 🔍 工具链版本审计（调试用）

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-tools:
    runs-on: ubuntu-latest
    steps:
      - name: 📋 记录系统基线工具版本
        run: |
          echo "============================="
          echo "  系统基线工具版本（升级前）"
          echo "============================="
          echo "--- OS ---"
          lsb_release -a 2>/dev/null || cat /etc/os-release
          uname -r
          echo ""
          echo "--- 编译器 ---"
          gcc --version 2>&1 | head -1 || echo "gcc: 未安装"
          g++ --version 2>&1 | head -1 || echo "g++: 未安装"
          echo ""
          echo "--- 构建工具 ---"
          make --version 2>&1 | head -1 || echo "make: 未安装"
          ld --version 2>&1 | head -1 || echo "ld: 未安装"
          as --version 2>&1 | head -1 || echo "as: 未安装"
          ar --version 2>&1 | head -1 || echo "ar: 未安装"
          objcopy --version 2>&1 | head -1 || echo "objcopy: 未安装"
          objdump --version 2>&1 | head -1 || echo "objdump: 未安装"
          strip --version 2>&1 | head -1 || echo "strip: 未安装"
          nm --version 2>&1 | head -1 || echo "nm: 未安装"
          echo ""
          echo "--- 辅助工具 ---"
          ccache --version 2>&1 | head -1 || echo "ccache: 未安装"
          pahole --version 2>&1 | head -1 || echo "pahole: 未安装"
          bison --version 2>&1 | head -1 || echo "bison: 未安装"
          flex --version 2>&1 | head -1 || echo "flex: 未安装"
          bc --version 2>&1 | head -1 || echo "bc: 未安装"
          rsync --version 2>&1 | head -1 || echo "rsync: 未安装"
          patch --version 2>&1 | head -1 || echo "patch: 未安装"
          cmake --version 2>&1 | head -1 || echo "cmake: 未安装"
          echo ""
          echo "--- 压缩工具 ---"
          zstd --version 2>&1 | head -1 || echo "zstd: 未安装"
          lz4 --version 2>&1 | head -1 || echo "lz4: 未安装"
          xz --version 2>&1 | head -1 || echo "xz: 未安装"
          gzip --version 2>&1 | head -1 || echo "gzip: 未安装"
          bzip2 --version 2>&1 | head -1 || echo "bzip2: 未安装"
          echo ""
          echo "--- 其它 ---"
          git --version 2>&1 | head -1 || echo "git: 未安装"
          curl --version 2>&1 | head -1 || echo "curl: 未安装"
          openssl version 2>&1 | head -1 || echo "openssl: 未安装"
          perl --version 2>&1 | head -1 || echo "perl: 未安装"
          python3 --version 2>&1 | head -1 || echo "python3: 未安装"
          dpkg --version 2>&1 | head -1 || echo "dpkg: 未安装"
          fakeroot --version 2>&1 | head -1 || echo "fakeroot: 未安装"
          kmod --version 2>&1 | head -1 || echo "kmod: 未安装"
          cpio --version 2>&1 | head -1 || echo "cpio: 未安装"
          jq --version 2>&1 | head -1 || echo "jq: 未安装"
          echo ""
          echo "--- dpkg 已安装的关键包版本 ---"
          dpkg -l | grep -E 'gcc-|g\+\+-|binutils|make |libssl|libelf|libncurses|libdw|liblz4|libzstd|dwarves|pahole|ccache|bison|flex|build-essential|dpkg-dev|debhelper|fakeroot|kmod|linux-libc' | awk '{printf "%-40s %s\n", $2, $3}'

      - name: 🔧 安装构建依赖（最新版工具链）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FAIL_COUNT=0
          GH_API="Authorization: Bearer ${GH_TOKEN}"

          # 辅助函数：获取 GitHub 最新 release tag（去掉 v 前缀）
          gh_latest() {
            curl -sf -H "${GH_API}" "https://api.github.com/repos/$1/releases/latest" | jq -r .tag_name | tr -d 'v'
          }

          # ===== 1. GCC 15（最新版编译器）=====
          echo "===== [1/5] GCC 15 ====="
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          # 不安装 cmake（系统自带 3.31.6，apt 仓库只有 3.28.3 会降级）
          sudo apt-get install -y --no-install-recommends \
            gcc-15 g++-15 \
            git build-essential ccache \
            libncurses-dev libssl-dev libelf-dev libdw-dev \
            bison bc flex rsync debhelper \
            dpkg-dev fakeroot kmod cpio dwarves \
            lz4 zstd xz-utils curl jq patch
          # 设置 GCC 15 为默认编译器
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 150 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-15 \
            --slave /usr/bin/gcov gcov /usr/bin/gcov-15
          echo "✅ GCC 15 安装完成: $(gcc-15 --version | head -1)"

          # ===== 2. ccache（最新版编译缓存）=====
          echo "===== [2/5] ccache ====="
          if CCACHE_VER=$(gh_latest ccache/ccache) && [ -n "${CCACHE_VER}" ]; then
            echo "升级 ccache → ${CCACHE_VER}"
            mkdir -p /tmp/ccache-install
            if curl -fL "https://github.com/ccache/ccache/releases/download/v${CCACHE_VER}/ccache-${CCACHE_VER}-linux-$(uname -m).tar.xz" \
              -o /tmp/ccache.tar.xz; then
              tar -xJf /tmp/ccache.tar.xz -C /tmp/ccache-install --strip-components=1
              sudo install -m 755 /tmp/ccache-install/ccache /usr/bin/ccache
              for prog in gcc g++ cc c++ gcc-15 g++-15; do
                sudo ln -sf /usr/bin/ccache "/usr/lib/ccache/${prog}"
              done
              echo "✅ ccache 升级完成: $(ccache --version | head -1)"
            else
              echo "⚠️ ccache 二进制下载失败，保留 apt 版本"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          else
            echo "⚠️ 无法获取 ccache 最新版本号，保留 apt 版本"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi

          # ===== 3. pahole/dwarves（最新版 BTF 生成工具）=====
          echo "===== [3/5] pahole/dwarves ====="
          if PAHOLE_VER=$(gh_latest acmel/dwarves) && [ -n "${PAHOLE_VER}" ]; then
            echo "升级 pahole → ${PAHOLE_VER}"
            if git clone --depth=1 --branch "v${PAHOLE_VER}" https://github.com/acmel/dwarves.git /tmp/dwarves 2>&1; then
              cmake -S /tmp/dwarves -B /tmp/dwarves/build \
                -DCMAKE_INSTALL_PREFIX=/usr -D__LIB=lib -DCMAKE_BUILD_TYPE=Release
              make -C /tmp/dwarves/build -j"$(nproc)"
              sudo make -C /tmp/dwarves/build install
              echo "✅ pahole 升级完成: $(pahole --version 2>&1 | head -1)"
            else
              echo "⚠️ pahole 源码克隆/构建失败，保留 apt 版本 (1.25)"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          else
            echo "⚠️ 无法获取 pahole 最新版本号，保留 apt 版本 (1.25)"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi

          # ===== 4. zstd（最新版压缩工具）=====
          echo "===== [4/5] zstd ====="
          if ZSTD_VER=$(gh_latest facebook/zstd) && [ -n "${ZSTD_VER}" ]; then
            echo "升级 zstd → ${ZSTD_VER}"
            if curl -fL "https://github.com/facebook/zstd/releases/download/v${ZSTD_VER}/zstd-${ZSTD_VER}.tar.gz" \
              | tar -xz -C /tmp; then
              make -C "/tmp/zstd-${ZSTD_VER}" -j"$(nproc)"
              sudo make -C "/tmp/zstd-${ZSTD_VER}" install PREFIX=/usr
              echo "✅ zstd 升级完成: $(zstd --version 2>&1 | head -1)"
            else
              echo "⚠️ zstd 源码下载/构建失败，保留系统版本"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          else
            echo "⚠️ 无法获取 zstd 最新版本号，保留系统版本"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi

          # ===== 5. lz4（最新版压缩工具）=====
          echo "===== [5/5] lz4 ====="
          if LZ4_VER=$(gh_latest lz4/lz4) && [ -n "${LZ4_VER}" ]; then
            echo "升级 lz4 → ${LZ4_VER}"
            if curl -fL "https://github.com/lz4/lz4/releases/download/v${LZ4_VER}/lz4-${LZ4_VER}.tar.gz" \
              | tar -xz -C /tmp; then
              make -C "/tmp/lz4-${LZ4_VER}" -j"$(nproc)"
              sudo make -C "/tmp/lz4-${LZ4_VER}" install PREFIX=/usr
              echo "✅ lz4 升级完成: $(lz4 --version 2>&1 | head -1)"
            else
              echo "⚠️ lz4 源码下载/构建失败，保留系统版本"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          else
            echo "⚠️ 无法获取 lz4 最新版本号，保留系统版本"
            FAIL_COUNT=$((FAIL_COUNT + 1))
          fi

          # 更新动态链接器缓存
          sudo ldconfig

          echo ""
          echo "===== 工具升级汇总 ====="
          if [ "${FAIL_COUNT}" -eq 0 ]; then
            echo "✅ 全部 5 个工具升级成功"
          else
            echo "⚠️ ${FAIL_COUNT} 个工具升级失败（已回退到 apt/系统版本）"
          fi

      - name: 📊 记录升级后工具版本
        run: |
          echo "============================="
          echo "  升级后工具版本（对比用）"
          echo "============================="
          echo "--- 编译器 ---"
          gcc --version 2>&1 | head -3
          echo ""
          g++ --version 2>&1 | head -1
          echo ""
          echo "--- binutils（链接器/汇编器等）---"
          ld --version 2>&1 | head -1
          as --version 2>&1 | head -1
          ar --version 2>&1 | head -1
          objcopy --version 2>&1 | head -1
          objdump --version 2>&1 | head -1
          strip --version 2>&1 | head -1
          nm --version 2>&1 | head -1
          readelf --version 2>&1 | head -1
          echo ""
          echo "--- 构建工具 ---"
          make --version 2>&1 | head -1
          cmake --version 2>&1 | head -1
          echo ""
          echo "--- 辅助工具 ---"
          ccache --version 2>&1 | head -1
          pahole --version 2>&1 | head -1
          bison --version 2>&1 | head -1
          flex --version 2>&1 | head -1
          bc --version 2>&1 | head -1
          rsync --version 2>&1 | head -1
          patch --version 2>&1 | head -1
          echo ""
          echo "--- 压缩工具 ---"
          zstd --version 2>&1 | head -1
          lz4 --version 2>&1 | head -1
          xz --version 2>&1 | head -1
          gzip --version 2>&1 | head -1
          bzip2 --version 2>&1 | head -1
          echo ""
          echo "--- 其它 ---"
          git --version 2>&1 | head -1
          curl --version 2>&1 | head -1
          openssl version 2>&1 | head -1
          perl --version 2>&1 | head -1
          python3 --version 2>&1 | head -1
          dpkg --version 2>&1 | head -1
          fakeroot --version 2>&1 | head -1
          kmod --version 2>&1 | head -1
          cpio --version 2>&1 | head -1
          jq --version 2>&1 | head -1
          echo ""
          echo "--- which 路径验证 ---"
          which gcc g++ cc c++ ld as make ccache pahole zstd lz4 2>&1
          echo ""
          echo "--- GCC 真实路径 ---"
          ls -la /usr/bin/gcc* /usr/bin/g++* 2>/dev/null || true
          ls -la /usr/lib/ccache/ 2>/dev/null || true
          echo ""
          echo "--- dpkg 升级后的关键包 ---"
          dpkg -l | grep -E 'gcc-|g\+\+-|binutils|make |libssl|libelf|libncurses|libdw|liblz4|libzstd|dwarves|pahole|ccache|bison|flex|build-essential|dpkg-dev|debhelper|fakeroot|kmod|linux-libc' | awk '{printf "%-40s %s\n", $2, $3}'

      - name: ✅ 审计完成
        run: |
          echo "工具链版本审计完成，请检查上述日志对比升级前后版本。"
          echo "确认无误后可恢复内核编译步骤。"
