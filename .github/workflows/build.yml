name: 构建带有BBRv3的内核

on:
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 删除旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 0

  build:
    needs: cleanup
    strategy:
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-latest
          #- arch: arm64
          #  runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    env:
      ARCH: ${{ matrix.arch }}
      KERNEL_VERSION: ""
    steps:
      - name: 获取内核版本
        id: get_kernel_version
        run: |
          version=$(curl -s https://www.kernel.org \
            | grep -A1 -m1 "mainline:" \
            | grep -oP '\d+\.\d+(\.\d+)?(-rc\d+)?')
          echo "KERNEL_VERSION=$version" >> $GITHUB_ENV

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖项
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential \
            libncurses-dev libssl-dev libelf-dev libdw-dev \
            bison bc flex rsync debhelper \
            dpkg-dev fakeroot kmod cpio dwarves \
            lz4 zstd xz-utils curl jq patch

      - name: 创建源码目录
        run: mkdir -p ./kernel/linux

      - name: 下载内核源代码
        working-directory: ./kernel
        run: |
          # 逻辑判断：RC 版本用 Tag 从 Torvalds 库下，正式版从 Greg 库下
          if [[ "${{ env.KERNEL_VERSION }}" == *"-rc"* ]]; then
            echo "检测到 Mainline/RC 版本，从 Torvalds 仓库克隆 Tag..."
            git clone --depth=1 --branch v${{ env.KERNEL_VERSION }} \
              https://github.com/torvalds/linux.git linux
          else
            echo "检测到 Stable 版本，从 Greg 仓库克隆分支..."
            branch=$(echo "${{ env.KERNEL_VERSION }}" | grep -oP '^\d+\.\d+')
            git clone --depth=1 --branch linux-$branch.y \
              https://github.com/gregkh/linux.git linux
          fi

      - name: 应用 CachyOS BBRv3 补丁
        working-directory: ./kernel/linux
        run: |
          set -euo pipefail
          kernel_series=$(echo "${{ env.KERNEL_VERSION }}" | grep -oP '^\d+\.\d+')
          if [ -z "$kernel_series" ]; then
            echo "无法从 KERNEL_VERSION=${{ env.KERNEL_VERSION }} 解析内核主版本号"
            exit 1
          fi

          patch_url="https://raw.githubusercontent.com/CachyOS/kernel-patches/master/${kernel_series}/0002-bbr3.patch"
          echo "下载并应用 BBRv3 补丁: $patch_url"
          curl -fL --retry 3 --retry-delay 2 "$patch_url" -o /tmp/0002-bbr3.patch
          patch --forward --batch -p1 < /tmp/0002-bbr3.patch

          grep -q "BBR" net/ipv4/tcp_bbr.c

      - name: 编译声明
        working-directory: ./kernel/linux
        run: |
          set -euo pipefail
          sed -i '/^MODULE_DESCRIPTION(".*BBR.*"/d' net/ipv4/tcp_bbr.c
          echo 'MODULE_DESCRIPTION("TCP BBR v3 (Bottleneck Bandwidth and RTT) - Compiled & Optimized from CachyOS kernel patch");' >> net/ipv4/tcp_bbr.c
          
          tail -n 5 net/ipv4/tcp_bbr.c

      - name: 更新 Makefile 中的版本号
        working-directory: ./kernel/linux
        run: |
          # IFS='.' read -r v p s <<< "${{ env.KERNEL_VERSION }}"
          # sed -i "s/^VERSION *=.*/VERSION = $v/" Makefile
          # sed -i "s/^PATCHLEVEL *=.*/PATCHLEVEL = $p/" Makefile
          # sed -i "s/^SUBLEVEL *=.*/SUBLEVEL = $s/" Makefile

          # 增加容错处理，防止 RC 版本导致变量为空
          v=$(echo "${{ env.KERNEL_VERSION }}" | cut -d. -f1)
          p=$(echo "${{ env.KERNEL_VERSION }}" | cut -d. -f2 | cut -d- -f1)
          s=$(echo "${{ env.KERNEL_VERSION }}" | cut -d. -f3 || echo "0")
          
          sed -i "s/^VERSION *=.*/VERSION = $v/" Makefile
          sed -i "s/^PATCHLEVEL *=.*/PATCHLEVEL = $p/" Makefile
          sed -i "s/^SUBLEVEL *=.*/SUBLEVEL = $s/" Makefile

      - name: 准备 .config 并禁用证书检查
        working-directory: ./kernel/linux
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            curl -sSL https://raw.githubusercontent.com/c000127/Actions-bbr-v3/main/arm64.config > .config
          else
            curl -sSL https://raw.githubusercontent.com/c000127/Actions-bbr-v3/main/x86-64.config > .config
          fi

          scripts/config --disable SYSTEM_TRUSTED_KEYS
          scripts/config --disable SYSTEM_REVOCATION_KEYS
          
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            make ARCH=arm64 olddefconfig
          else
            make olddefconfig
          fi

      - name: 构建内核 Debian 包
        working-directory: ./kernel/linux
        run: |
          set -euo pipefail
          native_arch=$(dpkg --print-architecture)
          sudo apt-get update
          sudo apt-get install -y "libdw-dev:${native_arch}" || sudo apt-get install -y libdw-dev
          dpkg-query -W -f='${Package}:${Architecture} ${Status}\n' "libdw-dev:${native_arch}" || true

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            make ARCH=arm64 bindeb-pkg -j$(nproc) LOCALVERSION=-c000127-bbrv3
          else
            make bindeb-pkg -j$(nproc) LOCALVERSION=-c000127-bbrv3
          fi

      - name: 上传配置文件
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ matrix.arch }}
          path: ./kernel/linux/.config

      - name: 上传 deb 包
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: ./kernel/linux-*.deb

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.arch }}-${{ env.KERNEL_VERSION }}
          files: ./kernel/linux-*.deb
          body: "带有 BBRv3 的最新内核，适用于 ${{ matrix.arch }} 架构。"
