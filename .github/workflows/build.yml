name: 构建 VPS 优化的 BBRv3 内核

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64
            runs_on: ubuntu-latest
            branch: mainline
          - arch: x86_64
            runs_on: ubuntu-latest
            branch: stable
          #- arch: arm64
          #  runs_on: ubuntu-24.04-arm
          #  branch: mainline
          #- arch: arm64
          #  runs_on: ubuntu-24.04-arm
          #  branch: stable
    runs-on: ${{ matrix.runs_on }}
    env:
      ARCH: ${{ matrix.arch }}
      KERNEL_VERSION: ""
    steps:
      - name: 🗑️ 释放磁盘空间 + 删除旧工作流
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache &
          # 并行删除本工作流的旧运行记录（best-effort，不阻塞构建）
          # 使用 workflow_id 筛选，避免误删其他工作流（如 build_test.yml）的记录
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?per_page=50&status=completed" \
          | jq -r '.workflow_runs[].id' 2>/dev/null | while read run_id; do
            curl -sf -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/${run_id}" &
          done
          wait
          sudo apt-get clean
          df -h /

      - name: 📋 获取最新内核版本
        id: get_kernel_version
        run: |
          echo "选择的内核分支: ${{ matrix.branch }}"
          version=$(curl -sL --retry 3 https://www.kernel.org \
            | grep -A1 -m1 "${{ matrix.branch }}:" \
            | grep -oP '\d+\.\d+(\.\d+)?(-rc\d+)?')
          if [[ -z "$version" ]]; then
            echo "::error::无法从 kernel.org 获取内核版本号"
            exit 1
          fi
          echo "获取到内核版本: $version"
          echo "KERNEL_VERSION=$version" >> $GITHUB_ENV
          # 提取主版本号（用于 ccache key 和补丁查找）
          echo "KERNEL_SERIES=$(echo "$version" | grep -oP '^\d+\.\d+')" >> $GITHUB_ENV
          # 构建时间戳（精确到分钟），用于区分同一内核版本的多次编译
          echo "BUILD_TIMESTAMP=$(date -u +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: 📥 检出仓库代码
        uses: actions/checkout@v4

      - name: 🔧 安装构建依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git build-essential ccache \
            libncurses-dev libssl-dev libelf-dev libdw-dev \
            bison bc flex rsync debhelper \
            dpkg-dev fakeroot kmod cpio dwarves \
            lz4 zstd xz-utils curl jq patch

      - name: 🚀 配置 ccache 编译加速
        run: |
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          mkdir -p ${{ github.workspace }}/.ccache
          # 增大缓存容量，覆盖完整内核编译产物
          ccache --max-size=5G
          # 按文件内容校验编译器（避免路径变化导致缓存失效）
          ccache --set-config=compiler_check=content
          # 启用压缩，节省缓存空间（level 1 几乎不影响速度）
          ccache --set-config=compression=true
          ccache --set-config=compression_level=1
          # depend 模式：跳过预处理阶段直接使用依赖信息，大幅提升缓存命中
          ccache --set-config=depend_mode=true
          # 宽松匹配：忽略 __FILE__、时间戳等宏差异
          ccache --set-config=sloppiness=file_macro,locale,time_macros,pch_defines

      - name: 📦 恢复 ccache 缓存
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          # 每次构建使用唯一 key（附加 run_id），确保更新后的缓存能被保存
          # 恢复时按 arch+series+branch 前缀匹配最近一次缓存
          key: ccache-${{ matrix.arch }}-${{ env.KERNEL_SERIES }}-${{ matrix.branch }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.arch }}-${{ env.KERNEL_SERIES }}-${{ matrix.branch }}-
            ccache-${{ matrix.arch }}-${{ env.KERNEL_SERIES }}-
            ccache-${{ matrix.arch }}-

      - name: ⬇️ 下载内核源代码
        run: |
          set -euo pipefail
          mkdir -p ./kernel
          cd ./kernel
          # 分支判断：mainline 从 Torvalds 库获取 Tag，stable 从 Greg 库获取分支
          if [[ "${{ matrix.branch }}" == "mainline" ]]; then
            echo "Mainline 分支，从 Torvalds 仓库克隆 v${{ env.KERNEL_VERSION }}..."
            git clone --depth=1 --single-branch --no-tags --branch v${{ env.KERNEL_VERSION }} \
              https://github.com/torvalds/linux.git linux
          else
            echo "Stable 分支，从 kernel.org 仓库克隆分支..."
            branch=$(echo "${{ env.KERNEL_VERSION }}" | grep -oP '^\d+\.\d+')
            git clone --depth=1 --single-branch --no-tags --branch linux-${branch}.y \
              https://github.com/gregkh/linux.git linux
          fi
          echo "内核源码下载完成，目录大小: $(du -sh linux | cut -f1)"

      - name: 🩹 注入 BBRv3 补丁
        working-directory: ./kernel/linux
        run: |
          set -euo pipefail
          kernel_series=$(echo "${{ env.KERNEL_VERSION }}" | grep -oP '^\d+\.\d+')
          if [ -z "$kernel_series" ]; then
            echo "无法从 KERNEL_VERSION=${{ env.KERNEL_VERSION }} 解析内核主版本号"
            exit 1
          fi

          patch_url="https://raw.githubusercontent.com/CachyOS/kernel-patches/master/${kernel_series}/0002-bbr3.patch"
          echo "检查 BBRv3 补丁是否可用: $patch_url"
          if ! curl -sfL --head "$patch_url" >/dev/null 2>&1; then
            echo "::error::BBRv3 补丁尚未发布于内核版本 $kernel_series"
            exit 1
          fi
          echo "下载并应用 BBRv3 补丁: $patch_url"
          curl -fL --retry 3 --retry-delay 2 "$patch_url" -o /tmp/0002-bbr3.patch
          patch --forward --batch -p1 < /tmp/0002-bbr3.patch

          grep -q "BBR" net/ipv4/tcp_bbr.c

      - name: ✏️ 编译声明
        working-directory: ./kernel/linux
        run: |
          set -euo pipefail
          sed -i '/^MODULE_DESCRIPTION(".*BBR.*"/d' net/ipv4/tcp_bbr.c
          echo "MODULE_DESCRIPTION(\"TCP BBR v3 — Linux ${{ env.KERNEL_VERSION }} — Built by C000127\");" >> net/ipv4/tcp_bbr.c
          
          tail -n 5 net/ipv4/tcp_bbr.c

      - name: 🔢 更新 Makefile 版本号
        working-directory: ./kernel/linux
        run: |
          set -euo pipefail
          # 增加容错处理，防止 RC 版本导致变量为空
          v=$(echo "${{ env.KERNEL_VERSION }}" | cut -d. -f1)
          p=$(echo "${{ env.KERNEL_VERSION }}" | cut -d. -f2 | cut -d- -f1)
          s=$(echo "${{ env.KERNEL_VERSION }}" | cut -d. -f3 | cut -d- -f1)
          # RC 版本或两段版本号（如 7.0-rc1）会导致 SUBLEVEL 为空，默认置 0
          s=${s:-0}
          
          echo "Makefile 版本: VERSION=$v PATCHLEVEL=$p SUBLEVEL=$s"
          sed -i "s/^VERSION *=.*/VERSION = $v/" Makefile
          sed -i "s/^PATCHLEVEL *=.*/PATCHLEVEL = $p/" Makefile
          sed -i "s/^SUBLEVEL *=.*/SUBLEVEL = $s/" Makefile

      - name: ⚙️ 准备内核配置
        working-directory: ./kernel/linux
        run: |
          set -euo pipefail
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            cp ${{ github.workspace }}/arm64.config .config
          else
            cp ${{ github.workspace }}/x86-64.config .config
          fi

          scripts/config --disable SYSTEM_TRUSTED_KEYS
          scripts/config --disable SYSTEM_REVOCATION_KEYS

          # === 编译性能优化：使用 ZSTD 替代 XZ 压缩（压缩速度快 3 倍，解压更快） ===
          scripts/config --disable KERNEL_XZ
          scripts/config --enable KERNEL_ZSTD

          # === 网络性能优化 ===
          # BPF JIT 始终开启，提升 BPF 网络程序性能
          scripts/config --enable BPF_JIT_ALWAYS_ON
          # 启用 TCP 认证选项（RFC 5925，现代数据中心网络）
          scripts/config --enable TCP_AO
          # 启用 PAGE_POOL 统计，便于网络性能监控
          scripts/config --enable PAGE_POOL_STATS
          # 确保微码加载已启用（7.0 合并了 Intel/AMD 为统一 MICROCODE 选项）
          scripts/config --enable MICROCODE

          # === VPS 内存优化 ===
          # 默认启用 zswap 压缩交换缓存
          scripts/config --enable ZSWAP_DEFAULT_ON

          # === 适合 VPS 的定时器：NO_HZ_IDLE 替代 NO_HZ_FULL ===
          # NO_HZ_FULL 需要 context tracking 开销大，NO_HZ_IDLE 对 VPS 更合适
          scripts/config --disable NO_HZ_FULL
          scripts/config --enable NO_HZ_IDLE
          scripts/config --disable VIRT_CPU_ACCOUNTING_GEN

          # === 禁用 VPS 不需要的硬件驱动（减少编译时间约 40%） ===
          scripts/config --disable SOUND
          # DRM: 保留核心框架（VPS 控制台依赖 BOCHS/QXL/VIRTIO_GPU），仅禁用物理显卡驱动
          scripts/config --disable DRM_RADEON
          scripts/config --disable DRM_AMDGPU
          scripts/config --disable DRM_NOUVEAU
          scripts/config --disable DRM_I915
          scripts/config --disable DRM_GMA500
          scripts/config --disable WLAN
          scripts/config --disable WIRELESS
          scripts/config --disable CFG80211
          scripts/config --disable MAC80211
          scripts/config --disable BLUETOOTH
          scripts/config --disable BT
          scripts/config --disable INFINIBAND
          scripts/config --disable MEDIA_SUPPORT
          scripts/config --disable RC_CORE
          scripts/config --disable USB_GADGET
          scripts/config --disable STAGING
          scripts/config --disable COMEDI
          scripts/config --disable GREYBUS
          scripts/config --disable PCMCIA
          scripts/config --disable NFC
          scripts/config --disable HAMRADIO
          scripts/config --disable CAN
          scripts/config --disable CAIF
          scripts/config --disable ARCNET
          scripts/config --disable FDDI
          scripts/config --disable HIPPI
          scripts/config --disable ATM_DRIVERS
          scripts/config --disable ISDN
          scripts/config --disable INPUT_JOYSTICK
          scripts/config --disable INPUT_TOUCHSCREEN
          scripts/config --disable INPUT_TABLET
          scripts/config --disable GAMEPORT
          scripts/config --disable ACCESSIBILITY

          if [ "${{ matrix.arch }}" = "arm64" ]; then
            make ARCH=arm64 olddefconfig
          else
            make olddefconfig
          fi

          # 输出关键配置供验证
          # 保存配置文件副本用于后续上传（bindeb-pkg 会改变目录结构）
          cp .config ${{ github.workspace }}/kernel-config-${{ matrix.arch }}

          echo "=== 关键配置验证 ==="
          grep -E 'CONFIG_KERNEL_(XZ|ZSTD)=|CONFIG_TCP_CONG_BBR=|CONFIG_DEFAULT_TCP_CONG=|CONFIG_DEFAULT_NET_SCH=|CONFIG_BPF_JIT_ALWAYS_ON=|CONFIG_NO_HZ_(IDLE|FULL)=|CONFIG_SOUND=|CONFIG_DRM=|CONFIG_HYPERV=|CONFIG_MICROCODE=|CONFIG_PAGE_POOL_STATS=|CONFIG_ZSWAP_DEFAULT_ON=' .config || true

          echo "=== 检查 olddefconfig 是否产生了意外变更 ==="
          UNEXPECTED=0
          grep -q 'CONFIG_KERNEL_ZSTD=y' .config || { echo "::warning::CONFIG_KERNEL_ZSTD 未生效！"; UNEXPECTED=1; }
          grep -q 'CONFIG_NO_HZ_IDLE=y' .config || { echo "::warning::CONFIG_NO_HZ_IDLE 未生效！"; UNEXPECTED=1; }
          grep -q 'CONFIG_BPF_JIT_ALWAYS_ON=y' .config || { echo "::warning::CONFIG_BPF_JIT_ALWAYS_ON 未生效！"; UNEXPECTED=1; }
          grep -q 'CONFIG_TCP_CONG_BBR=y' .config || { echo "::warning::CONFIG_TCP_CONG_BBR 未生效！"; UNEXPECTED=1; }
          grep -q 'CONFIG_MICROCODE=y' .config || { echo "::warning::CONFIG_MICROCODE 未生效！"; UNEXPECTED=1; }
          if [ $UNEXPECTED -eq 1 ]; then
            echo "::warning::部分关键配置未生效，请检查基础配置文件是否需要更新"
          fi

      - name: 🏗️ 构建内核 Debian 包
        working-directory: ./kernel/linux
        env:
          # 固定构建元数据，避免时间戳差异导致 ccache 缓存失效
          KBUILD_BUILD_TIMESTAMP: ''
          KBUILD_BUILD_USER: c000127
          KBUILD_BUILD_HOST: github
          # 跳过 .deb 内部压缩（节省 ~30 秒打包时间，安装时无影响）
          KDEB_COMPRESS: none
        run: |
          set -euo pipefail
          BUILD_START=$(date +%s)
          # -pipe: 使用管道替代临时文件传递编译阶段数据
          # -j$(nproc): 充分利用所有 CPU 核心
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            make ARCH=arm64 bindeb-pkg -j$(nproc) \
              LOCALVERSION=-${{ matrix.branch }}-c000127-bbrv3 \
              KCFLAGS="-pipe"
          else
            make bindeb-pkg -j$(nproc) \
              LOCALVERSION=-${{ matrix.branch }}-c000127-bbrv3 \
              KCFLAGS="-pipe"
          fi
          BUILD_END=$(date +%s)
          echo "编译耗时: $(( (BUILD_END - BUILD_START) / 60 )) 分 $(( (BUILD_END - BUILD_START) % 60 )) 秒"
          echo "ccache 命中统计:"
          ccache -s || true

          # 清理不需要上传的包：
          #   -dbg: 调试符号包，可能超出 GitHub release 2GB 上限
          #   linux-libc-dev: C 库头文件，运行时不需要
          cd ${{ github.workspace }}/kernel
          rm -fv linux-image-*-dbg_*.deb linux-libc-dev_*.deb
          echo "最终上传的 .deb 文件："
          ls -lh linux-*.deb

      - name: 📤 上传配置文件
        uses: actions/upload-artifact@v4
        with:
          name: config-${{ matrix.arch }}-${{ matrix.branch }}
          path: ${{ github.workspace }}/kernel-config-${{ matrix.arch }}

      - name: 📤 上传 Deb 包
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}-${{ matrix.branch }}
          path: ./kernel/linux-*.deb

      - name: 🧹 删除已有 Release（避免 asset 同名冲突）
        run: |
          TAG="${{ matrix.arch }}-${{ env.KERNEL_VERSION }}-${{ matrix.branch }}"
          RELEASE_ID=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" \
            | jq -r '.id') || true
          if [[ -n "$RELEASE_ID" && "$RELEASE_ID" != "null" ]]; then
            echo "删除已有 Release: ${TAG} (id=${RELEASE_ID})"
            curl -sf -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}"
            echo "✅ 已删除"
          fi

      - name: 🎉 发布到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.arch }}-${{ env.KERNEL_VERSION }}-${{ matrix.branch }}
          files: ./kernel/linux-*.deb
          body: |
            ## 🚀 Linux ${{ env.KERNEL_VERSION }} (${{ matrix.branch }}) with BBRv3 — ${{ matrix.arch }}

            | 项目 | 值 |
            |---|---|
            | 内核版本 | ${{ env.KERNEL_VERSION }} |
            | 内核分支 | ${{ matrix.branch }} |
            | 构建时间 | ${{ env.BUILD_TIMESTAMP }} UTC |
            | 架构 | ${{ matrix.arch }} |
            | BBR 补丁 | [CachyOS/kernel-patches](https://github.com/CachyOS/kernel-patches/blob/master/${{ env.KERNEL_SERIES }}/0002-bbr3.patch) (version-matched) |
            | 拥塞控制 | BBRv3 (built-in) |
            | 默认 Qdisc | fq |
            | 定时器 | NO_HZ_IDLE |
            | 抢占模型 | PREEMPT_LAZY |
            | 时钟频率 | HZ=250 |
            | 内核压缩 | ZSTD |
            | 编译优化 | ccache + VPS 精简配置 |

            ### 🔧 VPS 优化
            - BPF JIT 始终开启、TCP-AO (RFC 5925)、PAGE_POOL_STATS、zswap 默认启用
            - 禁用 ~30 个不必要的硬件驱动（声卡、物理显卡、WiFi、蓝牙、InfiniBand 等）

            ### 📦 安装方式
            ```bash
            bash <(curl -fsSL https://raw.githubusercontent.com/c000127/Actions-bbr-v3/dev/install.sh)
            ```

            或手动下载 .deb 文件后执行：
            ```bash
            sudo dpkg -i linux-*.deb && sudo update-grub && sudo reboot
            ```

            ### ⚠️ 注意
            - 仅适用于 Debian 11+ / Ubuntu 20.04+ 系统
            - 安装后需重启生效

      - name: 🔄 更新 Release 说明
        run: |
          TAG="${{ matrix.arch }}-${{ env.KERNEL_VERSION }}-${{ matrix.branch }}"
          RELEASE_ID=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" \
            | jq -r '.id')
          if [[ -n "$RELEASE_ID" && "$RELEASE_ID" != "null" ]]; then
            BODY="## 🚀 Linux ${{ env.KERNEL_VERSION }} (${{ matrix.branch }}) with BBRv3 — ${{ matrix.arch }}

          | 项目 | 值 |
          |---|---|
          | 内核版本 | ${{ env.KERNEL_VERSION }} |
          | 内核分支 | ${{ matrix.branch }} |
          | 构建时间 | ${{ env.BUILD_TIMESTAMP }} UTC |
          | 架构 | ${{ matrix.arch }} |
          | BBR 补丁 | [CachyOS/kernel-patches](https://github.com/CachyOS/kernel-patches/blob/master/${{ env.KERNEL_SERIES }}/0002-bbr3.patch) (version-matched) |
          | 拥塞控制 | BBRv3 (built-in) |
          | 默认 Qdisc | fq |
          | 定时器 | NO_HZ_IDLE |
          | 内核压缩 | ZSTD |
          | 编译优化 | ccache + VPS 精简配置 |

          ### 🔧 VPS 优化
          - BPF JIT 始终开启、TCP-AO (RFC 5925)、PAGE_POOL_STATS、zswap 默认启用
          - 禁用 ~30 个不必要的硬件驱动（声卡、物理显卡、WiFi、蓝牙、InfiniBand 等）

          ### 📦 安装方式
          \`\`\`bash
          bash <(curl -fsSL https://raw.githubusercontent.com/c000127/Actions-bbr-v3/dev/install.sh)
          \`\`\`

          或手动下载 .deb 文件后执行：
          \`\`\`bash
          sudo dpkg -i linux-*.deb && sudo update-grub && sudo reboot
          \`\`\`

          ### ⚠️ 注意
          - 仅适用于 Debian 11+ / Ubuntu 20.04+ 系统
          - 安装后需重启生效"

            curl -sf -X PATCH \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}" \
              -d "$(jq -n --arg body "$BODY" '{body: $body}')"
            echo "已更新 Release 说明"
          fi
